name: QA Automation Pipeline

# Trigger: run on every push or pull request to main branch
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Run Selenium & API Tests
    runs-on: ubuntu-latest

    steps:

      # -------------------------------------------------------
      # Step 1: Checkout the repository code
      # -------------------------------------------------------
      - name: Checkout Code
        uses: actions/checkout@v4

      # -------------------------------------------------------
      # Step 2: Set up Python
      # -------------------------------------------------------
      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # -------------------------------------------------------
      # Step 3: Install dependencies
      # -------------------------------------------------------
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # -------------------------------------------------------
      # Step 4: Install Chrome browser (for Selenium)
      # -------------------------------------------------------
      - name: Install Google Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      # -------------------------------------------------------
      # Step 5: Install Allure CLI (for generating reports)
      # -------------------------------------------------------
      - name: Install Allure CLI
        run: |
          sudo apt-get install -y default-jre
          curl -o allure-2.27.0.tgz -L https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.tgz
          tar -zxvf allure-2.27.0.tgz
          sudo mv allure-2.27.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/bin/allure

      # -------------------------------------------------------
      # Step 6: Run API tests (no browser needed)
      # -------------------------------------------------------
      - name: Run API Tests
        run: |
          pytest tests/test_api.py -v \
            --alluredir=reports/allure-results \
            --html=reports/api_report.html \
            --self-contained-html

      # -------------------------------------------------------
      # Step 7: Run Selenium UI tests in headless mode
      # -------------------------------------------------------
      - name: Run UI Tests (Headless)
        continue-on-error: true
        run: |
          pytest tests/test_field_validations.py \
                 tests/test_file_upload.py \
                 tests/test_form_submission.py \
                 -v \
                 --alluredir=reports/allure-results \
                 --html=reports/ui_report.html \
                 --self-contained-html
        env:
          # Tell Selenium to run headless in CI (no display available)
          HEADLESS: "true"

      # -------------------------------------------------------
      # Step 8: Generate Allure Report
      # -------------------------------------------------------
      - name: Generate Allure Report
        if: always()  # run even if tests fail
        run: |
          allure generate reports/allure-results --clean -o reports/allure-report

      # -------------------------------------------------------
      # Step 9: Upload reports as artifacts
      # (downloadable from GitHub Actions after each run)
      # -------------------------------------------------------
      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: reports/allure-report

      - name: Upload HTML Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: html-reports
          path: reports/*.html

      # -------------------------------------------------------
      # Step 10: Post test summary to GitHub Actions UI
      # -------------------------------------------------------
      - name: Test Summary
        if: always()
        run: |
          echo "======================================"
          echo "  QA Automation Pipeline Complete"
          echo "======================================"
          echo "Reports uploaded as GitHub Actions artifacts."
          echo "Download from the Actions tab to view results."
